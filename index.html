<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>西语词汇辨析 · 目录</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <div class="module-tag">Vocabulario Español</div>
      <h1>西语词汇辨析</h1>
    </div>
    <div class="header-tag">INDEX</div>
  </div>

  <div class="section-label">全部篇目</div>
  <div class="loading" id="status">正在扫描篇目…</div>
  <table class="index-table" id="list-table" style="display:none">
    <thead>
      <tr>
        <th class="label-col">编号</th>
        <th>标题</th>
        <th>模块</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="list-body"></tbody>
  </table>
  <div class="loading" id="empty-tip" style="display:none">暂无篇目，请添加 data001.js 开始使用。</div>

</div>
<script>
var MAX_ID     = 200;
var STOP_AFTER = 3;
var found      = 0;
var current    = 1;
var missStreak = 0;
var tbody      = document.getElementById("list-body");
var table      = document.getElementById("list-table");
var statusEl     = document.getElementById("status");
var emptyTip   = document.getElementById("empty-tip");

function pad(n) {
  return n < 10 ? "00" + n : n < 100 ? "0" + n : "" + n;
}

function done() {
  statusEl.style.display = "none";   // ← 改这里
  if (found === 0) {
    emptyTip.style.display = "block";
  } else {
    table.style.display = "table";
  }
}


function tryNext() {
  if (current > MAX_ID || missStreak >= STOP_AFTER) {
    done();
    return;
  }

  var idStr  = pad(current);
  var script = document.createElement("script");
  script.src = "data" + idStr + ".js?_=" + Date.now();

  script.onload = function() {
    if (typeof DATA !== "undefined" && DATA.meta) {
      tbody.innerHTML +=
        "<tr>" +
        "<td class='label-col'>" + idStr + "</td>" +
        "<td><strong>" + (DATA.meta.title  || "（无标题）") + "</strong></td>" +
        "<td>"          + (DATA.meta.module || "—")         + "</td>" +
        "<td><a class='open-btn' href='lesson.html?id=" + idStr + "'>打开 →</a></td>" +
        "</tr>";
      found++;
      missStreak = 0;
    }
    window.DATA = undefined;
    document.head.removeChild(script);
    current++;
    tryNext();
  };

  script.onerror = function() {
    missStreak++;
    document.head.removeChild(script);
    current++;
    tryNext();
  };

  document.head.appendChild(script);
}

tryNext();
</script>
</body>
</html>
